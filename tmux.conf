# vim: fdm=marker fen fdl=0

# Documentation {{{
# Reference example to set colors
#  - https://github.com/seebi/tmux-colors-solarized
# Character pair     Replaced with
#  #(shell-command)  First line of the command's output
#  #[attributes]     Colour or attribute change
#  #H                Hostname of local host
#  #h                Hostname of local host without the domain name
#  #F                Current window flag
#  #I                Current window index
#  #D                Current pane unique identifier
#  #S                Session name
#  #T                Current pane title
#  #W                Current window name
#  ##                A literal `#'
#
# Date
#  #y year (last 2 digits)
#  #m month
#  #d day
#  #H hour (from 0 to 24)
#  #M minutes
#  #S seconds
# }}}

unbind C-b
set -g prefix C-a

# Send the prefix to the nested TMUX to avoid
# double pressing the prefix.
bind C-a send-prefix

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-features ",*:RGB"

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size
set -g history-limit 100000

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Source .tmux.conf as suggested in `man tmux`
bind r source-file "~/.tmux.conf"

# Use VIM navigation in copy mode
set -g mode-keys vi

# Status line ON
set-option -g status on

# Status line updating interval(sec):default 15sec
set -g status-interval 5


#set -g pane-border-style fg=colour239  # Darker gray for inactive panes
#set -g pane-active-border-style fg=colour214  # Bright yellow for active panes

# ---- Key Bindings -----
# Use VIM navigation between panes.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-like copy/paste
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Alt+hjkl to switch panes (vim-style)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt+number to select window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Split windows in to same directory
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# popup a scratch terminal
bind t popup -E
bind y popup -w 60% -h 60% -E 'vim ~/Documents/notes/notes.md'
# Show keyboard shortcut cheatsheet
bind ? popup -w 80% -h 80% -E 'less ~/dotfiles/vim.txt'
bind / popup -w 80% -h 80% -E 'less ~/dotfiles/vim.txt'

# pop up a quick shell
bind-key -n F10 display-popup -E -d "#{pane_current_path}" -w 50% -h 50% "$SHELL"

# pop up the matrix screen
bind-key -n F12 display-popup -E -w 100% -h 100% "/usr/local/bin/cmatrix -u 10"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# F7 passes through to Vim, OR opens the window selection tree in tmux
bind-key -n F7 if-shell "$is_vim" \
    "send-keys F7" \
    "choose-tree -w"

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
# clock
#set-window-option -g clock-mode-colour colour64 #green


# --- Status Bar  ---
set -g status-position top
set -g status-left-length 150
set -g status-right-length 150
set -g status-justify left
setw -g window-status-separator ""
set -g @default_bg "#1e1e2e"
set -g @default_fg "#cdd6f4"
set -g status-style "bg=#{@default_bg},fg=#{@default_fg}"

