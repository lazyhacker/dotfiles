# --- Color Palette (Cyberpunk Noir) ---
set -g @theme_bg       "#08080a" # Deep carbon black
set -g @theme_fg       "#47535e" # Muted steel (Subtle inactive text)
set -g @theme_surface0 "#16161d" # Dark slate
set -g @theme_surface1 "#25252e" # Lighter slate
set -g @theme_surface2 "#00f0ff" # Electric Blue (Glow accent)
set -g @theme_black    "#000000" 
set -g @theme_blue     "#00f0ff" # Neon Cyan
set -g @theme_orange   "#f3e600" # Cyberpunk Yellow
set -g @theme_green    "#00ff9f" # Matrix-Neo Green
set -g @theme_teal     "#711c91" # Cyber Purple
set -g @theme_mauve    "#ea00d9" # Neon Magenta
set -g @theme_flamingo "#ff003c" # Arasaka Red
set -g @theme_overlay0 "#47535e"
set -g @theme_low_blue "#003d4d"

# --- Functional Component Styles ---

# Status Left Styles
set -g @theme_user "fg=#{@theme_blue},bg=#{@theme_low_blue},none"
set -g @theme_prefix   "fg=#{@theme_black},bg=#{@theme_orange},bold"
set -g @theme_session  "fg=#{@theme_blue},bg=#{@theme_black}"

# Window List Styles
# Inactive windows are very dark and "dimmed" to stay out of the way
set -g @theme_win_inactive "fg=#{@theme_fg},bg=#{@theme_bg},none"
# Active window has a high-contrast "electric" glow
set -g @theme_win_active   "fg=#{@theme_black},bg=#{@theme_blue},bold"

# Status Right Styles
set -g @theme_pane     "fg=#{@theme_blue},bg=#{@theme_surface0}"
set -g @theme_cmd      "fg=#{@theme_mauve},bg=#{@theme_black}"
set -g @theme_time     "fg=#{@theme_black},bg=#{@theme_flamingo}"

# UI Elements
set -g @theme_spacer   "bg=#{@theme_bg}" 
set -g @theme_clock    "#{@theme_blue}"
