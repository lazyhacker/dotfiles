version = 4

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    leading_diamond = '╭─'
    trailing_diamond = ''
    template = ' {{ .Name }} '
    foreground = '#ffffff'
    background = '#0077c2'
    type = 'shell'
    style = 'diamond'

  [[blocks.segments]]
    template = '  '
    foreground = '#FFFB38'
    powerline_symbol = ''
    background = '#ef5350'
    type = 'root'
    style = 'powerline'

  [[blocks.segments]]
    template = ' {{ if .SSHSession }} {{ .UserName }}@{{ .HostName }} {{ end }} '
    foreground = '#ffffff'
    powerline_symbol = ''
    background = '#33658A'
    type = 'session'
    style = 'powerline'

  [[blocks.segments]]
    template = '  {{ .Full }} '
    foreground = '#ffffff'
    powerline_symbol = ''
    background = '#7FD5EA'
    type = 'go'
    style = 'powerline'

  [[blocks.segments]]
    template = ' {{ .HEAD }} {{ if .Working.Changed }}{{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} S {{ .Staging.String }}{{ end }} '
    foreground = '#011627'
    powerline_symbol = ''
    background = '#FFFB38'
    type = 'git'
    style = 'powerline'
    background_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}#ffeb95{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#c5e478{{ end }}', '{{ if gt .Ahead 0 }}#C792EA{{ end }}', '{{ if gt .Behind 0 }}#C792EA{{ end }}']

    [blocks.segments.options]
      branch_icon = ' '
      fetch_status = true
      fetch_upstream_icon = true

[[blocks]]
  type = 'prompt'
  alignment = 'right'
  filler = '<#888888>─</>'

  [[blocks.segments]]
    template = ' node {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}'
    foreground = '#3C873A'
    powerline_symbol = ''
    background = '#303030'
    type = 'node'
    style = 'powerline'
    invert_powerline = true

    [blocks.segments.options]
      fetch_package_manager = true
      npm_icon = ' npm '
      yarn_icon = ' yarn '

  [[blocks.segments]]
    template = '  {{ .Full }} '
    foreground = '#ffd43b'
    powerline_symbol = ''
    background = '#306998'
    type = 'python'
    style = 'powerline'

  [[blocks.segments]]
    leading_diamond = ''
    template = ' {{ .CurrentDate | date .Format }} '
    foreground = '#ffffff'
    background = '#40c4ff'
    type = 'time'
    style = 'diamond'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '╰─'
    foreground = '#21c7c7'
    type = 'text'
    style = 'plain'

  [[blocks.segments]]
    template = '<#5e81ac>[</>{{ .Path }}<#5e81ac>]</>'
    foreground = '#E4E4E4'
    type = 'path'
    style = 'plain'

    [blocks.segments.options]
      style = 'full'

  [[blocks.segments]]
    template = '$ '
    foreground = '#e0f8ff'
    type = 'status'
    style = 'plain'
    foreground_templates = ['{{ if gt .Code 0 }}#ef5350{{ end }}']

    [blocks.segments.options]
      always_enabled = true
