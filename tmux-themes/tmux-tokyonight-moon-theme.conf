# --- Color Palette (Tokyo Night Moon) ---
set -g @theme_bg       "#222436" # Background
set -g @theme_fg       "#c8d3f5" # Foreground
set -g @theme_surface0 "#2d3f76" # Selection/Surface
set -g @theme_surface1 "#444a73" # Comments
set -g @theme_surface2 "#636da6" # Medium Grey
set -g @theme_black    "#1b1d2b" # Deep Black
set -g @theme_blue     "#82aaff" # Bright Blue
set -g @theme_orange   "#ff966c" # Orange
set -g @theme_green    "#c3e88d" # Green
set -g @theme_teal     "#4fd6be" # Teal/Cyan
set -g @theme_mauve    "#c099ff" # Purple
set -g @theme_flamingo "#ff757f" # Red/Pink
set -g @theme_overlay0 "#828bb8" # Muted Blue-Grey

# --- Functional Component Styles ---
# Format: "fg=color,bg=color,attribute"

# Status Left Styles
set -g @theme_user     "fg=#{@theme_black},bg=#{@theme_blue},bold"
set -g @theme_prefix   "fg=#{@theme_black},bg=#{@theme_teal},bold"
set -g @theme_session  "fg=#{@theme_black},bg=#{@theme_orange},bold"

# Window List Styles
set -g @theme_win_inactive "fg=#{@theme_fg},bg=#{@theme_surface0},none"
set -g @theme_win_active   "fg=#{@theme_black},bg=#{@theme_green},bold"

# Status Right Styles
set -g @theme_pane     "fg=#{@theme_black},bg=#{@theme_blue},bold"
set -g @theme_cmd      "fg=#{@theme_black},bg=#{@theme_mauve},bold"
set -g @theme_time     "fg=#{@theme_black},bg=#{@theme_flamingo},bold"

# UI Elements
set -g @theme_spacer   "bg=#{@theme_bg}" # The gaps between segments
set -g @theme_clock    "#{@theme_green}"
