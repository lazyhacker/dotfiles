# --- Status Left: User, Prefix, and Session ---
set -g status-left "#[#{E:@theme_user}] #(whoami)@#H "
set -ga status-left "#{?client_prefix,#[#{E:@theme_spacer}] #[#{E:@theme_prefix}]  ,}"
set -ga status-left "#[#{E:@theme_spacer}] #[#{E:@theme_session}] #S "

# --- Window List ---
setw -g window-status-format "#[#{E:@theme_spacer}] #[#{E:@theme_win_inactive}] #I #[fg=#{@theme_overlay0},bg=#{@theme_surface0}] #W "
setw -g window-status-current-format "#[#{E:@theme_spacer}] #[#{E:@theme_win_active}] #I #[fg=#{@theme_fg},bg=#{@theme_surface1}] #W "

# --- Status Right: Pane, Program, and Date/Time ---
set -g status-right "#[#{E:@theme_pane}] P:#P "
set -ga status-right "#[#{E:@theme_spacer}] #[#{E:@theme_cmd}] #{pane_current_command} "
set -ga status-right "#[#{E:@theme_spacer}] #[#{E:@theme_time}] %a %b %d %H:%M "
