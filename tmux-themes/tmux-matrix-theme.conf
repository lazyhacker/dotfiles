# --- Color Palette (The Matrix) ---
set -g @theme_bg       "#0d0d0d" # Deep digital void
set -g @theme_fg       "#008f11" # Classic terminal green
set -g @theme_surface0 "#003b00" # Darkest forest green
set -g @theme_surface1 "#005c00" # Muted green
set -g @theme_surface2 "#008f11" # Mid-tone green
set -g @theme_black    "#000000" # Pure black
set -g @theme_blue     "#008f11" # (Mapped to green for consistency)
set -g @theme_orange   "#adff2f" # Digital Lime (for high alert/prefix)
set -g @theme_green    "#00ff41" # The "Code" neon green
set -g @theme_teal     "#00cc00" # Matrix Teal-Green
set -g @theme_mauve    "#003b00" # Deep green
set -g @theme_flamingo "#005c00" # Muted green
set -g @theme_overlay0 "#003b00"

# --- Functional Component Styles ---
# Note: "bold" is removed from inactive elements to keep it subtle.

# Status Left Styles
set -g @theme_user     "fg=#{@theme_green},bg=#{@theme_surface0}"
set -g @theme_prefix   "fg=#{@theme_black},bg=#{@theme_orange},bold"
set -g @theme_session  "fg=#{@theme_green},bg=#{@theme_black}"

# Window List Styles
# Inactive windows blend into the background; active windows "glow"
set -g @theme_win_inactive "fg=#{@theme_surface1},bg=#{@theme_bg},none"
set -g @theme_win_active   "fg=#{@theme_black},bg=#{@theme_green},bold"

# Status Right Styles
set -g @theme_pane     "fg=#{@theme_green},bg=#{@theme_surface0}"
set -g @theme_cmd      "fg=#{@theme_green},bg=#{@theme_black}"
set -g @theme_time     "fg=#{@theme_green},bg=#{@theme_surface0}"

# UI Elements
set -g @theme_spacer   "bg=#{@theme_bg}" 
set -g @theme_clock    "#{@theme_green}"
