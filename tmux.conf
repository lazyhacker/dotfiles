#    "set-option -g status-position bottom \; \
#     source-file -F '#{d:current_file}/tmux-themes/tmux-cyberpunk-nior-theme.conf' \; \
#     source-file -F '#{d:current_file}/tmux-statusbar-bottom.conf'" \
#    "set-option -g status-position top \; \
#     source-file -F '#{d:current_file}/tmux-themes/tmux-catppuccin-mocha-theme.conf' \; \
#     source-file -F '#{d:current_file}/tmux-statusbar-top.conf'"

# =====================================================================
# Environment-Based Theme Switching (SSH vs Podman Container vs Local)
# =====================================================================

%if "#{M:*SSH_CONNECTION*,#{client_environment}}"
    # -----------------------------------------------------------------
    # Condition 1: SSH / Remote Server
    # -----------------------------------------------------------------
    set-option -g status-position bottom
    source-file -F '#{d:current_file}/tmux-themes/tmux-rosepine-theme.conf'
    source-file -F '#{d:current_file}/tmux-statusbar-bottom.conf'

%else
    # Not SSH, so check if we are inside a Podman container
    %if "#{file_exists:/run/.containerenv}"
        # -------------------------------------------------------------
        # Condition 2: Podman Container
        # -------------------------------------------------------------
        set-option -g status-position bottom
        # Change these to whatever theme/statusbar file you want for your containers
        source-file -F '#{d:current_file}/tmux-themes/tmux-cyberpunk-nior-theme.conf'
        source-file -F '#{d:current_file}/tmux-statusbar-bottom.conf'
        
    %else
        # -------------------------------------------------------------
        # Condition 3: Local Machine (Default)
        # -------------------------------------------------------------
        set-option -g status-position top
        source-file -F '#{d:current_file}/tmux-themes/tmux-catppuccin-mocha-theme.conf'
        source-file -F '#{d:current_file}/tmux-statusbar-top.conf'
    %endif

%endif
