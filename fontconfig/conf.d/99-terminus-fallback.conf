<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <alias>
        <family>TerminusWithIcons</family>
        <prefer>
            <family>Terminus</family> <family>Cascadia Code NF </family> </prefer>
    </alias>

    <match target="pattern">
        <test name="family">
            <string>TerminusWithIcons</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>monospace</string>
        </edit>
    </match>
</fontconfig>
