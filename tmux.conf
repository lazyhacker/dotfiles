# vim: fdm=marker fen fdl=0

# Documentation {{{
# Reference example to set colors
#  - https://github.com/seebi/tmux-colors-solarized
# Character pair     Replaced with
#  #(shell-command)  First line of the command's output
#  #[attributes]     Colour or attribute change
#  #H                Hostname of local host
#  #h                Hostname of local host without the domain name
#  #F                Current window flag
#  #I                Current window index
#  #D                Current pane unique identifier
#  #S                Session name
#  #T                Current pane title
#  #W                Current window name
#  ##                A literal `#'
#
# Date
#  #y year (last 2 digits)
#  #m month
#  #d day
#  #H hour (from 0 to 24)
#  #M minutes
#  #S seconds
# }}}

#unbind C-b
#set -g prefix C-Space
#bind C-Space send-prefix

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-features ",*:RGB"

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size
set -g history-limit 100000

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Source .tmux.conf as suggested in `man tmux`
bind r source-file "~/.tmux.conf"

# Use VIM navigation in copy mode
set -g mode-keys vi

# Status line ON
set-option -g status on

# Status line updating interval(sec):default 15sec
set -g status-interval 5

# Status line position (top/bottom) - tmux 1.7 or later
set -g status-position bottom

# clock
set-window-option -g clock-mode-colour colour64 #green

#set -g pane-border-style fg=colour239  # Darker gray for inactive panes
#set -g pane-active-border-style fg=colour214  # Bright yellow for active panes

# ---- Key Bindings -----
# Use VIM navigation between panes.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-like copy/paste
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Alt+hjkl to switch panes (vim-style)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt+number to select window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Split windows in to same directory
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# popup a scratch terminal
bind t popup -E
bind n popup -w 60% -h 60% -E 'vim ~/Documents/notes/notes.md'
# Show keyboard shortcut cheatsheet
bind ? popup -w 80% -h 80% -E 'less ~/dotfiles/vim.txt'

# --- Color Definitions (Catppuccin Mocha) ---
set -g @ctp_bg "#1e1e2e"
set -g @ctp_fg "#cdd6f4"
set -g @ctp_surface0 "#313244"
set -g @ctp_surface1 "#45475a"
set -g @ctp_surface2 "#585b70"
set -g @ctp_black "#11111b"
set -g @ctp_blue "#89b4fa"
set -g @ctp_orange "#fab387"
set -g @ctp_green "#a6e3a1"
set -g @ctp_sapphire "#74c7ec"
set -g @ctp_flamingo "#f2cdcd"
set -g @ctp_overlay0 "#a6adc8"
set -g @ctp_teal "#94e2d5"    # Sea Green color
set -g @ctp_mauve "#cba6f7"   # Purple color

# --- Status Bar General ---
set -g status-style "bg=#{@ctp_bg},fg=#{@ctp_fg}"
set -g status-left-length 150
set -g status-right-length 150
set -g status-justify left
setw -g window-status-separator ""

# --- Status Left: User and Session ---
# [username@host] [session]
set -g status-left "#[fg=#{@ctp_black},bg=#{@ctp_blue},bold] #(whoami)@#H "
set -ga status-left "#[fg=#{@ctp_bg},bg=#{@ctp_bg}] #[fg=#{@ctp_black},bg=#{@ctp_orange},bold] #S "

# --- Window List (Middle) ---
setw -g window-status-format "#[fg=#{@ctp_bg},bg=#{@ctp_bg}] #[fg=#{@ctp_fg},bg=#{@ctp_surface2}] #I #[fg=#{@ctp_overlay0},bg=#{@ctp_surface0}] #W "
setw -g window-status-current-format "#[fg=#{@ctp_bg},bg=#{@ctp_bg}] #[fg=#{@ctp_black},bg=#{@ctp_green},bold] #I #[fg=#{@ctp_fg},bg=#{@ctp_surface1}] #W "

# --- Status Right: Pane, Program, Prefix, and Date/Time ---

# 1. Pane Number (Sapphire)
set -g status-right "#[fg=#11111b,bg=#89b4fa,bold] P:#P "

# 2. Program Name (Purple / Mauve)
set -ga status-right "#[fg=#1e1e2e,bg=#1e1e2e] #[fg=#11111b,bg=#cba6f7,bold] #{pane_current_command} "

# 3. Prefix Indicator (Sea Green / Teal)
# The comma inside the braces separates 'if true' from 'if false'.
# We've removed the extra literal comma.
set -ga status-right "#{?client_prefix,#[fg=#1e1e2e]#[bg=#1e1e2e] #[fg=#11111b]#[bg=#94e2d5]#[bold]  ,}"

# 4. Date/Time (Flamingo)
set -ga status-right "#[fg=#1e1e2e,bg=#1e1e2e] #[fg=#11111b,bg=#f2cdcd,bold] %a %b %d %H:%M "
