# --- Color Palette (Catppuccin Mocha) ---
set -g @theme_bg "#1e1e2e"
set -g @theme_fg "#cdd6f4"
set -g @theme_surface0 "#313244"
set -g @theme_surface1 "#45475a"
set -g @theme_surface2 "#585b70"
set -g @theme_black "#11111b"
set -g @theme_blue "#89b4fa"
set -g @theme_orange "#fab387"
set -g @theme_green "#a6e3a1"
set -g @theme_teal "#94e2d5"
set -g @theme_mauve "#cba6f7"
set -g @theme_flamingo "#f2cdcd"
set -g @theme_overlay0 "#a6adc8"

# --- Functional Component Styles ---
# This is where you define the "Look and Feel"
# Format: "fg=color,bg=color,attribute"

# Status Left Styles
set -g @theme_user     "fg=#{@theme_black},bg=#{@theme_blue},bold"
set -g @theme_prefix   "fg=#{@theme_black},bg=#{@theme_teal},bold"
set -g @theme_session  "fg=#{@theme_black},bg=#{@theme_orange},bold"

# Window List Styles
set -g @theme_win_inactive "fg=#{@theme_fg},bg=#{@theme_surface2},none"
set -g @theme_win_active   "fg=#{@theme_black},bg=#{@theme_green},bold"

# Status Right Styles
set -g @theme_pane     "fg=#{@theme_black},bg=#{@theme_blue},bold"
set -g @theme_cmd      "fg=#{@theme_black},bg=#{@theme_mauve},bold"
set -g @theme_time     "fg=#{@theme_black},bg=#{@theme_flamingo},bold"

# UI Elements
set -g @theme_spacer   "bg=#{@theme_bg}" # The gaps between segments
set -g @theme_clock    "#{@theme_green}"
