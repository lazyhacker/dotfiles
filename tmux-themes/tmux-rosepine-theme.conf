# =====================================================================
# --- Color Palette (Rosé Pine - Main) ---
# All natural pine, faux fur and a bit of soho vibes.
# =====================================================================
set -g @theme_bg       "#191724" # Base (Primary background)
set -g @theme_fg       "#e0def4" # Text (High contrast foreground)
set -g @theme_surface0 "#26233a" # Surface (Low contrast background)
set -g @theme_surface1 "#403d52" # Highlight Low / Muted (Comments)
set -g @theme_surface2 "#6e6a86" # Subtle (Medium contrast foreground)
set -g @theme_black    "#110f19" # Custom deeper black for high-contrast text
set -g @theme_blue     "#9ccfd8" # Foam (Terminal blue/info)
set -g @theme_orange   "#f6c177" # Gold (Terminal yellow/warnings)
set -g @theme_green    "#31748f" # Pine (Terminal green/functions)
set -g @theme_teal     "#ebbcba" # Rose (Terminal cyan/booleans)
set -g @theme_mauve    "#c4a7e7" # Iris (Terminal magenta/links)
set -g @theme_flamingo "#eb6f92" # Love (Terminal red/errors)
set -g @theme_overlay0 "#524f67" # Overlay (Medium contrast background)

# =====================================================================
# --- Functional Component Styles ---
# Format: "fg=color,bg=color,attribute"
# =====================================================================

# Status Left Styles
set -g @theme_user     "fg=#{@theme_black},bg=#{@theme_blue},bold"   # Foam accent
set -g @theme_prefix   "fg=#{@theme_black},bg=#{@theme_teal},bold"   # Rose accent
set -g @theme_session  "fg=#{@theme_black},bg=#{@theme_orange},bold" # Gold accent

# Window List Styles
# Inactive tabs use the muted purple-grey profile, Active uses a gorgeous Iris blend
set -g @theme_win_inactive "fg=#{@theme_fg},bg=#{@theme_surface0},none"
set -g @theme_win_active   "fg=#{@theme_black},bg=#{@theme_mauve},bold"

# Status Right Styles
set -g @theme_pane     "fg=#{@theme_black},bg=#{@theme_blue},bold"
set -g @theme_cmd      "fg=#{@theme_black},bg=#{@theme_teal},bold"
set -g @theme_time     "fg=#{@theme_black},bg=#{@theme_flamingo},bold" # Love accent

# UI Elements
set -g @theme_spacer   "bg=#{@theme_bg}" # The gaps between segments
set -g @theme_clock    "#{@theme_green}" # Pine accent
